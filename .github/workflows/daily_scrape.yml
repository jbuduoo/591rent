name: Daily 591 Scraper

on:
  schedule:
    # Runs at 00:00 UTC (08:00 Taipei) every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        npx playwright install --with-deps chromium

    - name: Run Scraper
      env:
        # Pass the Google Service Account JSON string from Secrets
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python run_all.py

    # Optional: If you want to keep local excel backups in the repo (not recommended for large data)
